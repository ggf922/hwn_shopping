<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하원나라 - 관리자</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">하원나라 <span>ADMIN</span></h1>
      <nav>
        <a href="/">쇼핑몰</a>
        <a href="/admin" class="active">관리자</a>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="vouchers">🎁 상품권 발권</button>
      <button class="admin-tab" data-tab="voucher-list">📋 상품권 목록</button>
      <button class="admin-tab" data-tab="products">📦 제품 관리</button>
      <button class="admin-tab" data-tab="orders">🧾 주문 내역</button>
    </div>

    <!-- 상품권 발권 -->
    <section id="tab-vouchers" class="tab-panel">
      <div class="card">
        <h3>상품권 발권</h3>
        <p style="color:#666;margin-top:8px">발권할 금액을 선택하고 수량을 입력해주세요.</p>

        <div class="amount-buttons" id="amount-buttons"></div>

        <div class="form-row" style="margin-top:20px">
          <label>발권 수량</label>
          <input type="number" id="issue-quantity" value="1" min="1" max="100" />
        </div>
        <button id="issue-btn" class="btn btn-primary btn-block" disabled>발권하기</button>

        <div id="issued-result" class="hidden" style="margin-top:24px">
          <h4>✅ 발권 완료</h4>
          <div id="voucher-result-grid" class="voucher-result-grid"></div>
        </div>
      </div>
    </section>

    <!-- 상품권 목록 -->
    <section id="tab-voucher-list" class="tab-panel hidden">
      <div class="toolbar">
        <h3>📋 발권된 상품권 목록</h3>
        <button class="btn btn-secondary btn-sm" id="refresh-vouchers">새로고침</button>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>일련번호</th>
            <th>액면가</th>
            <th>잔액</th>
            <th>상태</th>
            <th>발권일</th>
            <th style="width:240px">작업</th>
          </tr>
        </thead>
        <tbody id="voucher-tbody">
          <tr><td colspan="6" class="loading">불러오는 중...</td></tr>
        </tbody>
      </table>
    </section>

    <!-- 제품 관리 -->
    <section id="tab-products" class="tab-panel hidden">
      <div class="toolbar">
        <h3>📦 제품 관리</h3>
        <button class="btn btn-primary btn-sm" id="add-product-btn">+ 제품 등록</button>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:60px">이미지</th>
            <th>제품명</th>
            <th>가격</th>
            <th>재고</th>
            <th>설명</th>
            <th style="width:160px">작업</th>
          </tr>
        </thead>
        <tbody id="product-tbody">
          <tr><td colspan="6" class="loading">불러오는 중...</td></tr>
        </tbody>
      </table>
    </section>

    <!-- 주문 내역 -->
    <section id="tab-orders" class="tab-panel hidden">
      <div class="toolbar">
        <h3>🧾 주문 내역</h3>
        <button class="btn btn-secondary btn-sm" id="refresh-orders">새로고침</button>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>주문번호</th>
            <th>상품권</th>
            <th>제품명</th>
            <th>수량</th>
            <th>결제금액</th>
            <th>주문일시</th>
          </tr>
        </thead>
        <tbody id="order-tbody">
          <tr><td colspan="6" class="loading">불러오는 중...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <!-- 제품 등록/수정 모달 -->
  <div id="product-modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="product-modal-close">&times;</button>
      <h3 id="product-modal-title">제품 등록</h3>
      <input type="hidden" id="product-id" />
      <div class="form-row">
        <label>제품명 *</label>
        <input type="text" id="product-name" placeholder="예: 하원나라 한과세트" />
      </div>
      <div class="form-row">
        <label>가격 (원) *</label>
        <input type="number" id="product-price" min="0" placeholder="35000" />
      </div>
      <div class="form-row">
        <label>재고 수량</label>
        <input type="number" id="product-stock" min="0" value="0" />
      </div>
      <div class="form-row">
        <label>이미지 URL</label>
        <input type="text" id="product-image" placeholder="https://..." />
      </div>
      <div class="form-row">
        <label>설명</label>
        <textarea id="product-description" placeholder="제품 설명을 입력하세요."></textarea>
      </div>
      <button id="save-product-btn" class="btn btn-primary btn-block">저장</button>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
